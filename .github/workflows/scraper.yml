name: Scraper
on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: |
          mkdir -p data
          python scraper/main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DB_PATH: data/seen.db

      - name: Check DB exists
        run: |
          if [ ! -f data/seen.db ]; then
            echo "ERROR: data/seen.db not created — scraper failed"
            exit 1
          fi
          echo "DB size: $(du -sh data/seen.db)"

      - name: Commit DB
        run: |
          git config user.email "bot@base-scout"
          git config user.name "Scout Bot"
          git add data/seen.db
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "chore: update db"
          git push
