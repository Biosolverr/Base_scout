name: Scraper
on:
  schedule:
    - cron: '0 8,20 * * *'   # 2 раза в день
  workflow_dispatch:           # запуск вручную
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python scraper/main.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DB_PATH: data/seen.db
      - run: |            # коммитим обновлённую БД обратно в репо
          git config user.email "bot@base-scout"
          git config user.name "Scout Bot"
          git add data/seen.db
          git diff --staged --quiet || git commit -m "chore: update db"
          git push
